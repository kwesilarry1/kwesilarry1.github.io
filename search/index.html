<div id="searchbox">

        aria-label="search" type="search" autocomplete="off" maxlength="64">

<script src="https://cdnjs.cloudflare.com/ajax/libs/lunr.js/2.3.9/lunr.min.js"></script>

<script>
async function loadSearchIndex() {
    try {
        const response = await fetch('/index.json');
        if (!response.ok) {
            console.error('❌ Failed to load index.json');
            return;
        }

        const documents = await response.json();
        console.log("✅ Loaded index.json:", documents);

        if (!Array.isArray(documents) || documents.length === 0) {
            console.error("❌ index.json is empty or not structured correctly.");
            return;
        }

        const idx = lunr(function () {
            this.ref('permalink');  
            this.field('title');
            this.field('content');

            documents.forEach(doc => {
                if (doc.permalink && doc.title && doc.content) {
                    this.add(doc);
                }
            });
        });

        document.getElementById('searchInput').addEventListener('input', function () {
            const query = this.value.trim();
            console.log("🔎 Searching for:", query);

            const resultsContainer = document.getElementById('searchResults');
            resultsContainer.innerHTML = '';

            if (query.length === 0) return; 

            const results = idx.search(`*${query}*`); 
            console.log("🔍 Search results:", results);

            results.forEach(result => {
                const item = documents.find(doc => doc.permalink === result.ref);
                if (item) {
                    console.log("✅ Matched item:", item);
                    const li = document.createElement('li');
                    li.innerHTML = `<a href="${item.permalink}">${item.title}</a>`;
                    resultsContainer.appendChild(li);
                }
            });
        });

    } catch (error) {
        console.error('🔥 Search index loading error:', error);
    }
}

document.addEventListener('DOMContentLoaded', loadSearchIndex);
</script>
